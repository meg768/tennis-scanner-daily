<!DOCTYPE html>
<html lang="sv">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{pageTitle}}</title>
    <meta name="description" content="{{pageDescription}}" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Libre+Franklin:wght@400;500;600;700&family=Newsreader:opsz,wght@6..72,400;6..72,500;6..72,700&display=swap"
      rel="stylesheet"
    />
    <style>
:root {
  --theme-base: #bf6840;
  --canvas-top: color-mix(in srgb, var(--theme-base) 18%, white);
  --canvas: color-mix(in srgb, var(--theme-base) 11%, white);
  --canvas-bottom: color-mix(in srgb, var(--theme-base) 15%, white);
  --paper: color-mix(in srgb, var(--theme-base) 4%, white);
  --paper-soft: color-mix(in srgb, var(--theme-base) 2%, white);
  --ink: color-mix(in srgb, var(--theme-base) 12%, #1d1815);
  --muted: color-mix(in srgb, var(--theme-base) 22%, #64727a);
  --rule: color-mix(in srgb, var(--theme-base) 12%, rgba(29, 24, 21, 0.12));
  --accent-dark: color-mix(in srgb, var(--theme-base) 44%, #312118);
  --card-surface:
    linear-gradient(180deg, color-mix(in srgb, var(--theme-base) 5%, rgba(255, 255, 255, 0.92)), rgba(255, 255, 255, 0.98)),
    var(--paper-soft);
  --shadow: 0 20px 48px color-mix(in srgb, var(--theme-base) 12%, rgba(30, 27, 25, 0.08));
}

* {
  box-sizing: border-box;
}

html {
  background:
    radial-gradient(circle at top, rgba(255, 255, 255, 0.78), transparent 34%),
    linear-gradient(180deg, var(--canvas-top) 0%, var(--canvas) 35%, var(--canvas-bottom) 100%);
  color: var(--ink);
  font-size: 16px;
}

body {
  margin: 0;
  font-family: "Newsreader", Georgia, serif;
}

a {
  color: inherit;
  text-decoration: none;
}

.page-shell {
  width: min(1100px, calc(100vw - 2rem));
  margin: 1.25rem auto 1.75rem;
  padding: 1rem;
}

.masthead {
  padding: 1.1rem 1.1rem 1.25rem;
  background:
    linear-gradient(135deg, color-mix(in srgb, var(--theme-base) 7%, transparent), rgba(255, 255, 255, 0) 44%),
    var(--card-surface);
  border: 1px solid var(--rule);
  border-radius: 1.25rem;
  box-shadow: var(--shadow);
}

.masthead__rail,
.masthead__date,
.match-meta__item,
.match-block__label,
.footer-note {
  font-family: "Libre Franklin", "Helvetica Neue", Arial, sans-serif;
  letter-spacing: 0.12em;
  text-transform: uppercase;
}

.masthead__rail {
  display: flex;
  justify-content: space-between;
  gap: 1rem;
  padding-bottom: 0.85rem;
  border-bottom: 1px solid var(--rule);
  color: var(--muted);
  font-size: 0.66rem;
}

.masthead__title {
  margin: 0.9rem 0 0.35rem;
  font-family: "Cormorant Garamond", "Times New Roman", serif;
  font-size: clamp(2.7rem, 5vw, 4.1rem);
  line-height: 0.9;
  letter-spacing: -0.03em;
  font-weight: 600;
  text-align: center;
}

.masthead__date {
  margin: 0;
  color: var(--accent-dark);
  font-size: 0.69rem;
  text-align: center;
}

.masthead__deck {
  margin: 0.75rem auto 0;
  max-width: 62ch;
  font-size: 1.18rem;
  line-height: 1.55;
  color: var(--muted);
  text-align: center;
}

.match-list {
  display: grid;
  gap: 1rem;
  margin-top: 1rem;
}

.match-section {
  padding: 1rem;
  background: var(--card-surface);
  border: 1px solid var(--rule);
  border-radius: 1.15rem;
  box-shadow: var(--shadow);
}

.match-section__title {
  margin: 0;
  font-size: clamp(1.55rem, 2.4vw, 2rem);
  line-height: 1.08;
  letter-spacing: -0.02em;
  font-weight: 600;
}

.match-section__summary {
  margin: 0.65rem 0 0;
  max-width: 70ch;
  font-size: 1.2rem;
  line-height: 1.55;
  color: color-mix(in srgb, var(--theme-base) 15%, #2d383d);
}

.match-meta {
  display: grid;
  grid-template-columns: repeat(4, minmax(0, 1fr));
  gap: 0.75rem;
  margin-top: 1rem;
}

.match-meta__item {
  padding: 0.8rem;
  background: rgba(255, 255, 255, 0.68);
  border: 1px solid var(--rule);
  border-radius: 0.9rem;
  color: var(--muted);
  font-size: 0.68rem;
}

.match-meta__item strong {
  display: block;
  margin-top: 0.35rem;
  color: var(--ink);
  font-family: "Newsreader", Georgia, serif;
  font-size: 1.05rem;
  line-height: 1.45;
  letter-spacing: 0;
  text-transform: none;
  font-weight: 500;
}

.match-meta__subtext {
  display: block;
  margin-top: 0.2rem;
  color: var(--muted);
  font-family: "Libre Franklin", "Helvetica Neue", Arial, sans-serif;
  font-size: 0.62rem;
  letter-spacing: 0.08em;
  text-transform: uppercase;
}

.match-body {
  display: grid;
  grid-template-columns: minmax(0, 1.35fr) minmax(260px, 0.75fr);
  gap: 1rem;
  margin-top: 1rem;
}

.match-copy,
.match-side {
  display: grid;
  gap: 0.85rem;
}

.match-block {
  padding: 0.95rem;
  background: rgba(255, 255, 255, 0.68);
  border: 1px solid var(--rule);
  border-radius: 0.95rem;
}

.match-block__label {
  margin: 0 0 0.45rem;
  color: var(--accent-dark);
  font-size: 0.66rem;
  font-weight: 700;
}

.match-block p {
  margin: 0;
  font-size: 1.12rem;
  line-height: 1.58;
}

.match-block ul {
  margin: 0;
  padding-left: 1.1rem;
}

.match-block li {
  margin-bottom: 0.5rem;
  font-size: 1.08rem;
  line-height: 1.55;
}

.match-block li:last-child {
  margin-bottom: 0;
}

.mini-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 1rem;
  line-height: 1.45;
}

.mini-table th,
.mini-table td {
  padding: 0.45rem 0.35rem;
  border-bottom: 1px solid var(--rule);
  text-align: left;
  vertical-align: top;
}

.mini-table th {
  color: var(--muted);
  font-family: "Libre Franklin", "Helvetica Neue", Arial, sans-serif;
  font-size: 0.62rem;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  font-weight: 600;
}

.mini-table tr:last-child td {
  border-bottom: 0;
}

.footer-note {
  margin: 1rem 0 0;
  color: var(--muted);
  font-size: 0.66rem;
  line-height: 1.6;
}

@media (max-width: 980px) {
  .match-meta {
    grid-template-columns: repeat(2, minmax(0, 1fr));
  }

  .match-body {
    grid-template-columns: 1fr;
  }
}

@media (max-width: 720px) {
  .page-shell {
    width: min(100vw, calc(100vw - 0.8rem));
    margin: 0.4rem auto 1rem;
    padding: 0.4rem;
  }

  .masthead,
  .match-section {
    padding: 0.9rem;
    border-radius: 0.95rem;
  }

  .masthead__rail,
  .match-meta {
    grid-template-columns: 1fr;
    display: grid;
    gap: 0.35rem;
  }
}
    </style>
  </head>
  <body>
    <div class="page-shell">
      <header class="masthead">
        <div class="masthead__rail">
          {{railItems}}
        </div>
        <h1 class="masthead__title">{{title}}</h1>
        <p class="masthead__date">{{dateLine}}</p>
        <p class="masthead__deck">{{deck}}</p>
      </header>

      <main class="match-list">
        {{matchSections}}
      </main>

      <p class="footer-note">{{footerNote}}</p>
    </div>
  </body>
</html>
