<!DOCTYPE html>
<html lang="sv" class="{{themeClass}}">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{pageTitle}}</title>
    <meta name="description" content="{{pageDescription}}" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700;900&display=swap"
      rel="stylesheet"
    />
    <style>
:root {
  --theme-base: #5482b0;
  --theme-dark: #203346;
  --theme-soft: #eef2f7;
  --theme-soft-2: #dce6ef;
  --canvas-top: #f5f8fb;
  --canvas: #edf3f8;
  --canvas-bottom: #e5edf5;
  --paper: rgba(255, 255, 255, 0.96);
  --paper-soft: #f8fbfd;
  --ink: #101a23;
  --muted: #4a6074;
  --rule: rgba(50, 79, 108, 0.18);
  --accent-dark: #324f6c;
  --accent-soft: #779cc0;
  --card-surface: #f7fbff;
  --shadow: 0 18px 40px rgba(32, 51, 70, 0.08);
  --page-glow: rgba(84, 130, 176, 0.12);
  --page-glow-soft: rgba(84, 130, 176, 0.06);
  --panel-surface: #f1f6fb;
  --block-surface: #f8fbfe;
  --callout-surface: #edf4fa;
  --footer-surface: color-mix(in srgb, var(--theme-base) 6%, white);
  --flag-surface: rgba(255, 255, 255, 0.82);
  --flag-border: rgba(84, 130, 176, 0.22);
  --copy: #203346;
  --copy-soft: #31485b;
}

html.theme-clay,
body.theme-clay {
  --theme-base: #d96b47;
  --theme-dark: #703328;
  --theme-soft: #fdf7f4;
  --theme-soft-2: #fceee6;
  --canvas-top: #fdf7f4;
  --canvas: #f9efe8;
  --canvas-bottom: #f6e6dc;
  --paper: rgba(255, 255, 255, 0.96);
  --paper-soft: #fdf8f5;
  --ink: #34160f;
  --muted: #7b4b38;
  --rule: rgba(146, 65, 49, 0.18);
  --accent-dark: #924131;
  --accent-soft: #e78e6c;
  --card-surface: #fff8f4;
  --shadow: 0 18px 40px rgba(112, 51, 40, 0.08);
  --page-glow: rgba(217, 107, 71, 0.16);
  --page-glow-soft: rgba(217, 107, 71, 0.08);
  --panel-surface: #faeee6;
  --block-surface: #fff9f6;
  --callout-surface: #f6e7dd;
  --footer-surface: rgba(249, 236, 227, 0.78);
  --flag-surface: rgba(255, 248, 244, 0.86);
  --flag-border: rgba(146, 65, 49, 0.22);
  --copy: #4a241b;
  --copy-soft: #6f4536;
}

html.theme-grass,
body.theme-grass {
  --theme-base: #4b9e4b;
  --theme-dark: #235023;
  --theme-soft: #f5fbf5;
  --theme-soft-2: #e6f6e6;
  --canvas-top: #f5fbf5;
  --canvas: #edf7ed;
  --canvas-bottom: #e1f0e1;
  --paper: rgba(255, 255, 255, 0.96);
  --paper-soft: #f8fcf8;
  --ink: #0f250f;
  --muted: #3f6840;
  --rule: rgba(46, 104, 46, 0.18);
  --accent-dark: #2e682e;
  --accent-soft: #6cb86c;
  --card-surface: #fbfffb;
  --shadow: 0 18px 40px rgba(35, 80, 35, 0.08);
  --page-glow: rgba(75, 158, 75, 0.15);
  --page-glow-soft: rgba(75, 158, 75, 0.07);
  --panel-surface: #ebf6eb;
  --block-surface: #fafffa;
  --callout-surface: #e2f1e2;
  --footer-surface: rgba(234, 246, 234, 0.78);
  --flag-surface: rgba(248, 253, 248, 0.86);
  --flag-border: rgba(46, 104, 46, 0.22);
  --copy: #173317;
  --copy-soft: #355335;
}

@media (prefers-color-scheme: dark) {
  :root {
    --theme-base: #6f95bb;
    --theme-dark: #d9e6f2;
    --theme-soft: #17222d;
    --theme-soft-2: #243443;
    --canvas-top: #0a1219;
    --canvas: #0d1822;
    --canvas-bottom: #13212d;
    --paper: rgba(16, 27, 37, 0.96);
    --paper-soft: #15212c;
    --ink: #edf4fb;
    --muted: #a8bfd5;
    --rule: rgba(144, 173, 201, 0.24);
    --accent-dark: #b8d0e7;
    --accent-soft: #7ea6cd;
    --card-surface: #162432;
    --shadow: 0 20px 42px rgba(0, 0, 0, 0.28);
    --page-glow: rgba(84, 130, 176, 0.18);
    --page-glow-soft: rgba(84, 130, 176, 0.1);
    --panel-surface: #213445;
    --block-surface: #1a2a38;
    --callout-surface: #253a4c;
    --footer-surface: rgba(21, 35, 48, 0.92);
    --flag-surface: rgba(20, 33, 45, 0.95);
    --flag-border: rgba(144, 173, 201, 0.28);
    --copy: #e7f1fa;
    --copy-soft: #bfd0e1;
  }

  html.theme-clay,
  body.theme-clay {
    --theme-base: #e38a68;
    --theme-dark: #fee6db;
    --theme-soft: #2a1813;
    --theme-soft-2: #3a2119;
    --canvas-top: #190d09;
    --canvas: #23120d;
    --canvas-bottom: #2c1811;
    --paper: rgba(36, 21, 16, 0.96);
    --paper-soft: #311d16;
    --ink: #fff2ec;
    --muted: #e1b3a2;
    --rule: rgba(227, 138, 104, 0.24);
    --accent-dark: #ffd6c6;
    --accent-soft: #efab91;
    --card-surface: #2e1c16;
    --shadow: 0 20px 42px rgba(0, 0, 0, 0.3);
    --page-glow: rgba(217, 107, 71, 0.22);
    --page-glow-soft: rgba(217, 107, 71, 0.12);
    --panel-surface: #4a2a1f;
    --block-surface: #38211a;
    --callout-surface: #553023;
    --footer-surface: rgba(47, 27, 20, 0.92);
    --flag-surface: rgba(49, 29, 22, 0.95);
    --flag-border: rgba(227, 138, 104, 0.28);
    --copy: #fff1e9;
    --copy-soft: #ecc7b7;
  }

  html.theme-grass,
  body.theme-grass {
    --theme-base: #73b873;
    --theme-dark: #def5de;
    --theme-soft: #132113;
    --theme-soft-2: #1c2f1c;
    --canvas-top: #091309;
    --canvas: #0d1a0d;
    --canvas-bottom: #142314;
    --paper: rgba(19, 33, 19, 0.96);
    --paper-soft: #1a2b1a;
    --ink: #eefbee;
    --muted: #b0d7b0;
    --rule: rgba(115, 184, 115, 0.24);
    --accent-dark: #d5f1d5;
    --accent-soft: #97cf97;
    --card-surface: #1a2d1a;
    --shadow: 0 20px 42px rgba(0, 0, 0, 0.28);
    --page-glow: rgba(75, 158, 75, 0.2);
    --page-glow-soft: rgba(75, 158, 75, 0.1);
    --panel-surface: #294229;
    --block-surface: #203520;
    --callout-surface: #315031;
    --footer-surface: rgba(22, 38, 22, 0.92);
    --flag-surface: rgba(22, 38, 22, 0.95);
    --flag-border: rgba(115, 184, 115, 0.28);
    --copy: #eef9ee;
    --copy-soft: #c5dfc5;
  }
}

* {
  box-sizing: border-box;
}

html {
  background: var(--canvas-bottom);
  color: var(--ink);
  font-size: 16px;
  color-scheme: light dark;
}

body {
  margin: 0;
  font-family: "Lato", "Helvetica Neue", Arial, sans-serif;
}

a {
  color: inherit;
  text-decoration: none;
}

.page-shell {
  width: min(1180px, calc(100vw - 1.5rem));
  margin: 0.9rem auto 1.5rem;
  padding: 0.75rem;
}

.masthead {
  padding: 1rem 1rem 1.1rem;
  background: var(--card-surface);
  border: 1px solid var(--rule);
  border-radius: 0.45rem;
  box-shadow: var(--shadow);
  position: relative;
  overflow: hidden;
}

.masthead__rail,
.masthead__date,
.match-meta__item,
.match-block__label,
.footer-note {
  font-family: "Lato", "Helvetica Neue", Arial, sans-serif;
  letter-spacing: 0.1em;
  text-transform: uppercase;
}

.masthead__rail {
  display: flex;
  justify-content: space-between;
  gap: 1rem;
  padding: 0 0 0.8rem 0.55rem;
  border-bottom: 1px solid var(--rule);
  color: var(--muted);
  font-size: 0.68rem;
  font-weight: 700;
}

.masthead__title {
  margin: 0.95rem 0 0.55rem;
  font-family: "Lato", "Helvetica Neue", Arial, sans-serif;
  font-size: clamp(1.32rem, 2.7vw, 1.95rem);
  line-height: 1.05;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  font-weight: 700;
  text-align: center;
  color: var(--theme-dark);
}

.masthead__date {
  margin: 0;
  color: var(--accent-dark);
  font-size: 0.72rem;
  text-align: center;
  font-weight: 700;
}

.masthead__deck {
  margin: 0.8rem auto 0;
  max-width: 72ch;
  font-size: 1.02rem;
  line-height: 1.65;
  color: var(--muted);
  text-align: center;
}

.match-list {
  display: grid;
  gap: 0.85rem;
  margin-top: 0.9rem;
}

.match-section {
  padding: 0.95rem;
  background: var(--card-surface);
  border: 1px solid var(--rule);
  border-radius: 0.45rem;
  box-shadow: var(--shadow);
}

.match-section__title {
  margin: 0;
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  gap: 0.5rem;
  font-family: "Lato", "Helvetica Neue", Arial, sans-serif;
  font-size: clamp(1.08rem, 1.54vw, 1.28rem);
  line-height: 1.14;
  letter-spacing: -0.028em;
  font-weight: 600;
}

.match-title__side {
  display: inline-flex;
  align-items: center;
  gap: 0.54rem;
}

.match-title__flag {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 3em;
  height: 3em;
  min-width: 3em;
  min-height: 3em;
  padding: 0;
  border: 1px solid color-mix(in srgb, var(--theme-dark) 46%, white);
  border-radius: 999px;
  background: var(--flag-surface);
  background-repeat: no-repeat;
  background-position: center center;
  background-size: cover;
  box-shadow: 0 1px 0 color-mix(in srgb, var(--theme-dark) 14%, transparent);
  overflow: hidden;
  flex: 0 0 auto;
  color: var(--muted);
  font-family: "Lato", "Helvetica Neue", Arial, sans-serif;
  font-size: 0.52rem;
  font-weight: 700;
  letter-spacing: 0.04em;
  line-height: 1;
  text-transform: uppercase;
}

.match-title__name {
  display: inline-flex;
  flex-wrap: wrap;
  align-items: baseline;
  gap: 0.12rem;
  color: inherit;
}

.match-title__country {
  color: inherit;
  font-family: "Lato", "Helvetica Neue", Arial, sans-serif;
  font-size: 0.92em;
  letter-spacing: -0.01em;
  white-space: nowrap;
  font-weight: 600;
}

.match-title__rank {
  color: inherit;
  font-family: "Lato", "Helvetica Neue", Arial, sans-serif;
  font-size: 0.92em;
  letter-spacing: 0;
  white-space: nowrap;
  font-weight: 600;
}

.match-title__separator {
  color: inherit;
  font-size: 0.88em;
  margin: 0 0.12rem 0 0.02rem;
  font-weight: 500;
  text-transform: lowercase;
}

.match-section__summary {
  margin: 0.65rem 0 0;
  max-width: 70ch;
  font-family: "Lato", "Helvetica Neue", Arial, sans-serif;
  font-size: 1.14rem;
  line-height: 1.5;
  color: var(--copy-soft);
}

.match-meta {
  display: grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  gap: 0.75rem;
  margin-top: 1rem;
}

.match-meta__item {
  padding: 0.82rem;
  background: var(--panel-surface);
  border: 1px solid var(--rule);
  border-radius: 0.35rem;
  color: var(--muted);
  font-size: 0.68rem;
  font-weight: 700;
}

.match-meta__item strong {
  display: block;
  margin-top: 0.35rem;
  color: var(--ink);
  font-family: "Lato", "Helvetica Neue", Arial, sans-serif;
  font-size: 1rem;
  line-height: 1.45;
  letter-spacing: 0;
  text-transform: none;
  font-weight: 900;
}

.match-meta__subtext {
  display: block;
  margin-top: 0.2rem;
  color: var(--muted);
  font-family: "Lato", "Helvetica Neue", Arial, sans-serif;
  font-size: 0.62rem;
  letter-spacing: 0.08em;
  text-transform: uppercase;
}

.match-body {
  display: grid;
  grid-template-columns: minmax(0, 1.35fr) minmax(260px, 0.75fr);
  gap: 1rem;
  margin-top: 1rem;
}

.match-copy,
.match-side {
  display: grid;
  gap: 0.85rem;
}

.match-block--primary {
  margin-top: 1.5rem;
}

.match-block {
  padding: 0.9rem;
  background: var(--block-surface);
  border: 1px solid var(--rule);
  border-radius: 0.35rem;
}

.match-block__label {
  margin: 0 0 0.45rem;
  color: var(--theme-base);
  font-size: 0.68rem;
  font-weight: 700;
}

.match-block p:not(.match-block__label) {
  margin: 0;
  font-family: "Lato", "Helvetica Neue", Arial, sans-serif;
  font-size: 1.03rem;
  line-height: 1.62;
  color: var(--copy);
}

.match-block ul {
  margin: 0;
  padding-left: 1.1rem;
}

.match-block li {
  margin-bottom: 0.5rem;
  font-family: "Lato", "Helvetica Neue", Arial, sans-serif;
  font-size: 1rem;
  line-height: 1.55;
  color: var(--copy);
}

.match-block li:last-child {
  margin-bottom: 0;
}

.mini-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 0.95rem;
  line-height: 1.45;
}

.mini-table th,
.mini-table td {
  padding: 0.45rem 0.35rem;
  border-bottom: 1px solid var(--rule);
  text-align: left;
  vertical-align: top;
}

.mini-table th {
  color: var(--muted);
  font-family: "Lato", "Helvetica Neue", Arial, sans-serif;
  font-size: 0.62rem;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  font-weight: 900;
}

.mini-table tr:last-child td {
  border-bottom: 0;
}

.odds-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 0.95rem;
  line-height: 1.45;
}

.odds-table th,
.odds-table td {
  padding: 0.58rem 0.45rem;
  border-bottom: 1px solid var(--rule);
  text-align: left;
  vertical-align: top;
}

.odds-table th:first-child,
.odds-table td:first-child {
  width: 46%;
  padding-right: 1.1rem;
}

.odds-table th {
  color: var(--muted);
  font-family: "Lato", "Helvetica Neue", Arial, sans-serif;
  font-size: 0.62rem;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  font-weight: 900;
}

.odds-table tr:last-child td {
  border-bottom: 0;
}

.odds-callout {
  margin-top: 0.8rem !important;
  padding: 0.7rem 0.8rem;
  border-radius: 0.35rem;
  border: 1px solid var(--flag-border);
  background: var(--callout-surface);
}

.odds-callout strong {
  font-family: "Lato", "Helvetica Neue", Arial, sans-serif;
  color: var(--theme-dark);
}

.footer-note {
  margin: 1rem 0 0;
  padding: 0.8rem 1rem;
  color: var(--muted);
  font-size: 0.68rem;
  line-height: 1.6;
  border: 1px solid var(--rule);
  border-radius: 0.35rem;
  background: var(--footer-surface);
}

@media (max-width: 980px) {
  .match-meta {
    grid-template-columns: repeat(2, minmax(0, 1fr));
  }

  .match-body {
    grid-template-columns: 1fr;
  }
}

@media (max-width: 720px) {
  .page-shell {
    width: min(100vw, calc(100vw - 0.8rem));
    margin: 0.4rem auto 1rem;
    padding: 0.4rem;
  }

  .masthead,
  .match-section {
    padding: 0.9rem;
    border-radius: 0.35rem;
  }

  .masthead__rail,
  .match-meta {
    grid-template-columns: 1fr;
    display: grid;
    gap: 0.35rem;
  }

  .match-section__title {
    gap: 0.35rem;
  }

  .match-title__separator {
    width: auto;
    line-height: inherit;
  }
}
    </style>
  </head>
  <body class="{{themeClass}}">
    <div class="page-shell">
      <header class="masthead">
        <div class="masthead__rail">
          {{railItems}}
        </div>
        <h1 class="masthead__title">{{title}}</h1>
        <p class="masthead__date">{{dateLine}}</p>
        <p class="masthead__deck">Ett dagligt nyhetsblad med kommande ATP-singlar från Svenska Spel, match för match, med ranking, ELO, form, inbördes möten, odds och verifierat dagsläge i fokus.</p>
      </header>

      <main class="match-list">
        {{matchSections}}
      </main>

      <p class="footer-note">{{footerNote}}</p>
    </div>
  </body>
</html>
