<!DOCTYPE html>
<html lang="sv">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{pageTitle}}</title>
    <meta name="description" content="{{pageDescription}}" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700;900&display=swap"
      rel="stylesheet"
    />
    <style>
:root {
  --theme-base: #5482b0;
  --theme-dark: #203346;
  --theme-soft: #eef2f7;
  --theme-soft-2: #dce6ef;
  --canvas-top: #f5f8fb;
  --canvas: #edf3f8;
  --canvas-bottom: #e5edf5;
  --paper: rgba(255, 255, 255, 0.96);
  --paper-soft: #f8fbfd;
  --ink: #101a23;
  --muted: #4a6074;
  --rule: rgba(50, 79, 108, 0.18);
  --accent-dark: #324f6c;
  --accent-soft: #779cc0;
  --card-surface: linear-gradient(180deg, rgba(255, 255, 255, 0.99), rgba(245, 249, 252, 0.96));
  --shadow: 0 18px 40px rgba(32, 51, 70, 0.08);
}

* {
  box-sizing: border-box;
}

html {
  background:
    radial-gradient(circle at top, rgba(255, 255, 255, 0.82), transparent 30%),
    radial-gradient(circle at 100% 0, rgba(84, 130, 176, 0.08), transparent 28%),
    linear-gradient(180deg, var(--canvas-top) 0%, var(--canvas) 35%, var(--canvas-bottom) 100%);
  color: var(--ink);
  font-size: 16px;
}

body {
  margin: 0;
  font-family: "Lato", "Helvetica Neue", Arial, sans-serif;
}

a {
  color: inherit;
  text-decoration: none;
}

.page-shell {
  width: min(1180px, calc(100vw - 1.5rem));
  margin: 0.9rem auto 1.5rem;
  padding: 0.75rem;
}

.masthead {
  padding: 1rem 1rem 1.1rem;
  background:
    linear-gradient(135deg, rgba(84, 130, 176, 0.12), rgba(255, 255, 255, 0) 44%),
    var(--card-surface);
  border: 1px solid var(--rule);
  border-radius: 0.45rem;
  box-shadow: var(--shadow);
  position: relative;
  overflow: hidden;
}

.masthead__rail,
.masthead__date,
.match-meta__item,
.match-block__label,
.footer-note {
  font-family: "Lato", "Helvetica Neue", Arial, sans-serif;
  letter-spacing: 0.1em;
  text-transform: uppercase;
}

.masthead__rail {
  display: flex;
  justify-content: space-between;
  gap: 1rem;
  padding: 0 0 0.8rem 0.55rem;
  border-bottom: 1px solid var(--rule);
  color: var(--muted);
  font-size: 0.68rem;
  font-weight: 700;
}

.masthead__title {
  margin: 0.95rem 0 0.55rem;
  font-family: "Lato", "Helvetica Neue", Arial, sans-serif;
  font-size: clamp(1.9rem, 4vw, 2.85rem);
  line-height: 0.98;
  letter-spacing: -0.01em;
  font-weight: 600;
  text-align: center;
  color: var(--theme-dark);
}

.masthead__date {
  margin: 0;
  color: var(--accent-dark);
  font-size: 0.72rem;
  text-align: center;
  font-weight: 700;
}

.masthead__deck {
  margin: 0.8rem auto 0;
  max-width: 72ch;
  font-size: 1.02rem;
  line-height: 1.65;
  color: var(--muted);
  text-align: center;
}

.match-list {
  display: grid;
  gap: 0.85rem;
  margin-top: 0.9rem;
}

.match-section {
  padding: 0.95rem;
  background: var(--card-surface);
  border: 1px solid var(--rule);
  border-radius: 0.45rem;
  box-shadow: var(--shadow);
}

.match-section__title {
  margin: 0;
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  gap: 0.35rem;
  font-family: "Lato", "Helvetica Neue", Arial, sans-serif;
  font-size: clamp(1.2rem, 1.85vw, 1.55rem);
  line-height: 1.08;
  letter-spacing: -0.025em;
  font-weight: 700;
}

.match-title__side {
  display: inline-flex;
  align-items: center;
  gap: 0.38rem;
}

.match-title__flag {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  font-size: 0.94em;
  line-height: 1;
  width: 1.56em;
  height: 1.56em;
  border: 1px solid rgba(84, 130, 176, 0.22);
  border-radius: 999px;
  background: rgba(255, 255, 255, 0.82);
  box-shadow: 0 1px 2px rgba(16, 26, 35, 0.04);
}

.match-title__name {
  display: inline-flex;
  flex-wrap: wrap;
  align-items: baseline;
  gap: 0.18rem;
}

.match-title__rank {
  color: inherit;
  font-family: "Lato", "Helvetica Neue", Arial, sans-serif;
  font-size: 0.88em;
  letter-spacing: 0.01em;
  white-space: nowrap;
  color: var(--muted);
  font-weight: 700;
}

.match-title__separator {
  color: var(--muted);
  font-size: 0.78em;
  margin: 0 0.08rem;
}

.match-section__summary {
  margin: 0.65rem 0 0;
  max-width: 70ch;
  font-family: "Lato", "Helvetica Neue", Arial, sans-serif;
  font-size: 1.14rem;
  line-height: 1.5;
  color: #31485b;
}

.match-meta {
  display: grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  gap: 0.75rem;
  margin-top: 1rem;
}

.match-meta__item {
  padding: 0.82rem;
  background: linear-gradient(180deg, rgba(238, 242, 247, 0.75), rgba(255, 255, 255, 0.92));
  border: 1px solid var(--rule);
  border-radius: 0.35rem;
  color: var(--muted);
  font-size: 0.68rem;
  font-weight: 700;
}

.match-meta__item strong {
  display: block;
  margin-top: 0.35rem;
  color: var(--ink);
  font-family: "Lato", "Helvetica Neue", Arial, sans-serif;
  font-size: 1rem;
  line-height: 1.45;
  letter-spacing: 0;
  text-transform: none;
  font-weight: 900;
}

.match-meta__subtext {
  display: block;
  margin-top: 0.2rem;
  color: var(--muted);
  font-family: "Lato", "Helvetica Neue", Arial, sans-serif;
  font-size: 0.62rem;
  letter-spacing: 0.08em;
  text-transform: uppercase;
}

.match-body {
  display: grid;
  grid-template-columns: minmax(0, 1.35fr) minmax(260px, 0.75fr);
  gap: 1rem;
  margin-top: 1rem;
}

.match-copy,
.match-side {
  display: grid;
  gap: 0.85rem;
}

.match-block {
  padding: 0.9rem;
  background: linear-gradient(180deg, rgba(255, 255, 255, 0.96), rgba(247, 250, 252, 0.96));
  border: 1px solid var(--rule);
  border-radius: 0.35rem;
}

.match-block__label {
  margin: 0 0 0.45rem;
  color: var(--theme-base);
  font-size: 0.68rem;
  font-weight: 700;
}

.match-block p:not(.match-block__label) {
  margin: 0;
  font-family: "Lato", "Helvetica Neue", Arial, sans-serif;
  font-size: 1.03rem;
  line-height: 1.62;
  color: #203346;
}

.match-block ul {
  margin: 0;
  padding-left: 1.1rem;
}

.match-block li {
  margin-bottom: 0.5rem;
  font-family: "Lato", "Helvetica Neue", Arial, sans-serif;
  font-size: 1rem;
  line-height: 1.55;
  color: #203346;
}

.match-block li:last-child {
  margin-bottom: 0;
}

.mini-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 0.95rem;
  line-height: 1.45;
}

.mini-table th,
.mini-table td {
  padding: 0.45rem 0.35rem;
  border-bottom: 1px solid var(--rule);
  text-align: left;
  vertical-align: top;
}

.mini-table th {
  color: var(--muted);
  font-family: "Lato", "Helvetica Neue", Arial, sans-serif;
  font-size: 0.62rem;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  font-weight: 900;
}

.mini-table tr:last-child td {
  border-bottom: 0;
}

.odds-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 0.95rem;
  line-height: 1.45;
}

.odds-table th,
.odds-table td {
  padding: 0.45rem 0.35rem;
  border-bottom: 1px solid var(--rule);
  text-align: left;
  vertical-align: top;
}

.odds-table th {
  color: var(--muted);
  font-family: "Lato", "Helvetica Neue", Arial, sans-serif;
  font-size: 0.62rem;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  font-weight: 900;
}

.odds-table tr:last-child td {
  border-bottom: 0;
}

.odds-callout {
  margin-top: 0.8rem !important;
  padding: 0.7rem 0.8rem;
  border-radius: 0.35rem;
  border: 1px solid rgba(84, 130, 176, 0.22);
  background: linear-gradient(180deg, rgba(238, 242, 247, 0.72), rgba(255, 255, 255, 0.94));
}

.odds-callout strong {
  font-family: "Lato", "Helvetica Neue", Arial, sans-serif;
  color: var(--theme-dark);
}

.footer-note {
  margin: 1rem 0 0;
  padding: 0.8rem 1rem;
  color: var(--muted);
  font-size: 0.68rem;
  line-height: 1.6;
  border: 1px solid var(--rule);
  border-radius: 0.35rem;
  background: rgba(255, 255, 255, 0.86);
}

@media (max-width: 980px) {
  .match-meta {
    grid-template-columns: repeat(2, minmax(0, 1fr));
  }

  .match-body {
    grid-template-columns: 1fr;
  }
}

@media (max-width: 720px) {
  .page-shell {
    width: min(100vw, calc(100vw - 0.8rem));
    margin: 0.4rem auto 1rem;
    padding: 0.4rem;
  }

  .masthead,
  .match-section {
    padding: 0.9rem;
    border-radius: 0.35rem;
  }

  .masthead__rail,
  .match-meta {
    grid-template-columns: 1fr;
    display: grid;
    gap: 0.35rem;
  }

  .match-section__title {
    gap: 0.35rem;
  }

  .match-title__separator {
    width: 100%;
    line-height: 0.6;
  }
}
    </style>
  </head>
  <body>
    <div class="page-shell">
      <header class="masthead">
        <div class="masthead__rail">
          {{railItems}}
        </div>
        <h1 class="masthead__title">{{title}}</h1>
        <p class="masthead__date">{{dateLine}}</p>
        <p class="masthead__deck">Ett dagligt nyhetsblad med kommande ATP-singlar från Oddset, match för match, med ranking, ELO, form, inbördes möten, odds och verifierat dagsläge i fokus.</p>
      </header>

      <main class="match-list">
        {{matchSections}}
      </main>

      <p class="footer-note">{{footerNote}}</p>
    </div>
  </body>
</html>
